<div class="container capture-container">
  <div

  >
    <div class="card-header">
      <p>parent works!</p>
    </div>
    <div class="card-body">
      <div class="image-container container">
        <img src="https://snipboard.io/mF1dGU.jpg" alt="" />
      </div>
      <div class="m-2"></div>
      <div class="card">
        <div class="card-title container">Child component:</div>
        <div class="card-body">
          <div class="container">
            <app-child></app-child>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
